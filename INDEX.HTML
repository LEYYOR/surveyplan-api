<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SurveyPlan Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef1f5;color:#1a3a5c;}
header{background:#1a3a5c;color:white;padding:16px;display:flex;align-items:center;gap:12px;}
.logo{width:36px;height:36px;background:#c47c2b;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;flex-shrink:0;}
header h1{font-size:18px;font-weight:700;}
header p{font-size:11px;opacity:0.65;margin-top:2px;}
main{max-width:900px;margin:24px auto;padding:0 12px;display:flex;flex-direction:column;gap:20px;}
.card{background:white;border-radius:10px;padding:20px;box-shadow:0 2px 12px rgba(26,58,92,0.08);}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#1a3a5c;border-bottom:2px solid #c47c2b;padding-bottom:8px;margin-bottom:16px;}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#5a6a7a;}
input[type="text"],input[type="date"],textarea{padding:8px 10px;border:1.5px solid #d0dce8;border-radius:6px;font-size:13px;color:#1a3a5c;background:#f8fafc;outline:none;width:100%;}
textarea{resize:vertical;min-height:80px;font-size:12px;}
input:focus,textarea:focus{border-color:#1a3a5c;background:white;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#1a3a5c;color:white;}
thead th{padding:8px 6px;text-align:center;font-size:10px;font-weight:600;}
tbody tr:nth-child(even){background:#f8fafc;}
tbody td{padding:4px 4px;text-align:center;}
tbody input{padding:5px 6px;border:1.5px solid #d0dce8;border-radius:4px;font-size:11px;color:#1a3a5c;background:white;width:100%;text-align:center;}
tbody input:focus{border-color:#c47c2b;outline:none;}
.btn-remove{background:#fee2e2;color:#b91c1c;border:none;border-radius:4px;width:26px;height:26px;cursor:pointer;font-size:15px;font-weight:bold;margin:auto;display:flex;align-items:center;justify-content:center;}
.btn-add-row{margin-top:10px;padding:8px 14px;background:none;border:1.5px dashed #1a3a5c;border-radius:6px;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;width:100%;}
.generate-wrap{text-align:center;padding:8px 0;}
.btn-generate{padding:14px 40px;background:#c47c2b;color:white;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center;}
.btn-generate:disabled{background:#9aabb8;cursor:not-allowed;}
.status{text-align:center;font-size:13px;margin-top:10px;min-height:20px;font-weight:600;}
.status.loading{color:#1a3a5c;}
.status.success{color:#166534;}
.status.error{color:#b91c1c;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hint{font-size:11px;color:#9aabb8;margin-bottom:10px;}
@media(max-width:600px){.fields-grid{grid-template-columns:1fr;}.field.full{grid-column:1;}}
</style>
</head>
<body>
<header>
<div class="logo">⊕</div>
<div><h1>SurveyPlan Pro</h1><p>Enter survey data — PDF downloads automatically</p></div>
</header>
<main>

<div class="card">
<div class="card-title">Land / Plot Information</div>
<div class="fields-grid">
<div class="field full"><label>Owner / Client Name</label><input type="text" id="client_name" placeholder="MOSES OLUTUNDE MORA"/></div>
<div class="field full"><label>Address of Land</label><input type="text" id="plot_address" placeholder="AT PAKITI VILLAGE, OFF OLORUNDA AREA"/></div>
<div class="field full"><label>Locality / LGA</label><input type="text" id="locality" placeholder="LAGELU LOCAL GOVERNMENT AREA"/></div>
<div class="field"><label>State</label><input type="text" id="state" placeholder="OYO STATE"/></div>
<div class="field"><label>File Number</label><input type="text" id="file_no" placeholder="OY/1756/2024/35"/></div>
<div class="field"><label>Purpose</label><input type="text" id="purpose" placeholder="COFO"/></div>
<div class="field"><label>Scale</label><input type="text" id="scale" value="1:1000"/></div>
<div class="field"><label>Date of Survey</label><input type="date" id="survey_date"/></div>
<div class="field"><label>Origin Northing (mN)</label><input type="text" id="origin_n" placeholder="831838.423"/></div>
<div class="field"><label>Origin Easting (mE)</label><input type="text" id="origin_e" placeholder="609048.433"/></div>
</div>
</div>

<div class="card">
<div class="card-title">Surveyor / Firm Information</div>
<div class="fields-grid">
<div class="field full"><label>Surveyor / Firm Name</label><input type="text" id="surveyor_name" placeholder="DASFADS SURVEYS NIGERIA LTD"/></div>
<div class="field full"><label>Office Address (separate lines with comma)</label>
<textarea id="office_address" placeholder="SURVEYING & MAPPING CONSULTANTS, IMAFAM SHOPPING COMPLEX, IWO-ROAD OJOO EXPRESS WAY, BESIDE POPLAT PETROL STATION, CELE B. / STOP IWO ROAD IBADAN, OYO STATE NIGERIA"></textarea>
</div>
<div class="field"><label>Email</label><input type="text" id="email" placeholder="dasfads2@yahoo.com"/></div>
<div class="field"><label>Phone Number(s)</label><input type="text" id="phone" placeholder="08035767243, 08076597511"/></div>
</div>
</div>

<div class="card">
<div class="card-title">Traverse Stations</div>
<p class="hint">Bearing format: <strong>58 16</strong> (degrees minutes) &nbsp;|&nbsp; Distance in metres</p>
<table>
<thead><tr><th>Stn</th><th>Beacon</th><th>Bearing</th><th>Dist (m)</th><th></th></tr></thead>
<tbody id="traverse-body"></tbody>
</table>
<button class="btn-add-row" onclick="addRow()">+ Add Station</button>
</div>

<div class="generate-wrap">
<button class="btn-generate" id="gen-btn" onclick="generatePlan()">
<span id="btn-icon">📄</span><span id="btn-text">Generate Plan</span>
</button>
<div class="status" id="status-msg"></div>
</div>
</main>

<script>
document.getElementById('survey_date').value=new Date().toISOString().slice(0,10);
let rowCount=0;
function addRow(d={}){
  rowCount++;
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const stn=d.station||letters[(rowCount-1)%26];
  const tr=document.createElement('tr');
  tr.id='row-'+rowCount;
  tr.innerHTML='<td><input type="text" value="'+stn+'" style="width:35px;font-weight:700;color:#c47c2b;text-align:center;"/></td><td><input type="text" value="'+(d.beacon||'')+'" placeholder="EX5542HQ" style="width:80px;font-size:10px;"/></td><td><input type="text" value="'+(d.bearing||'')+'" placeholder="58 16"/></td><td><input type="text" value="'+(d.distance||'')+'" placeholder="0.000" style="text-align:right;"/></td><td><button class="btn-remove" onclick="this.closest(\'tr\').remove()">×</button></td>';
  document.getElementById('traverse-body').appendChild(tr);
}
async function generatePlan(){
  const beacons=[];
  const points=[];
  document.querySelectorAll('#traverse-body tr').forEach(tr=>{
    const inputs=tr.querySelectorAll('input');
    const station=inputs[0].value.trim();
    const beacon=inputs[1].value.trim();
    const bearing=inputs[2].value.trim();
    const distance=parseFloat(inputs[3].value);
    if(station&&bearing&&!isNaN(distance)){points.push({station,bearing,distance});beacons.push(beacon);}
  });
  const info={
    client_name:document.getElementById('client_name').value,
    plot_address:document.getElementById('plot_address').value,
    locality:document.getElementById('locality').value,
    state:document.getElementById('state').value,
    file_no:document.getElementById('file_no').value,
    purpose:document.getElementById('purpose').value,
    scale:document.getElementById('scale').value,
    survey_date:document.getElementById('survey_date').value,
    origin_n:document.getElementById('origin_n').value,
    origin_e:document.getElementById('origin_e').value,
    surveyor_name:document.getElementById('surveyor_name').value,
    office_address:document.getElementById('office_address').value,
    email:document.getElementById('email').value,
    phone:document.getElementById('phone').value,
    beacons:beacons.join(','),
    lga:document.getElementById('locality').value,
  };
  if(!info.client_name){document.getElementById('status-msg').className='status error';document.getElementById('status-msg').textContent='Please enter client name.';return;}
  if(points.length<3){document.getElementById('status-msg').className='status error';document.getElementById('status-msg').textContent='Please enter at least 3 stations.';return;}
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;
  document.getElementById('btn-icon').innerHTML='<span class="spinner"></span>';
  document.getElementById('btn-text').textContent='Generating...';
  document.getElementById('status-msg').className='status loading';
  document.getElementById('status-msg').textContent='Processing your survey data...';
  try{
    const response=await fetch('https://surveyplan-api.onrender.com/generate-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({survey_info:info,traverse_points:points})});
    if(!response.ok)throw new Error('Server error. Please try again.');
    const blob=await response.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='SurveyPlan_'+(info.file_no||'plan').replace(/\//g,'-')+'.pdf';
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('status-msg').className='status success';
    document.getElementById('status-msg').textContent='Plan generated! Check your downloads.';
    document.getElementById('btn-icon').textContent='✅';
    document.getElementById('btn-text').textContent='Generate Plan';
  }catch(err){
    document.getElementById('status-msg').className='status error';
    document.getElementById('status-msg').textContent='Error: '+err.message;
    document.getElementById('btn-icon').textContent='📄';
    document.getElementById('btn-text').textContent='Generate Plan';
  }
  btn.disabled=false;
}
</script>
</body>
</html>
